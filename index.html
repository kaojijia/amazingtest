<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情感人格类型心理测试</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>情感人格类型心理测试</h1>
            <p class="subtitle">探索你的情感特质，了解真实的自己</p>
        </div>
    </header>
    <main>
        <section id="test-container">
            <div id="questions-container">
                <div class="test-intro">
                    <h2>测试说明</h2>
                    <div class="intro-content">
                        <p>1. 本测试共60道题目，均为单选题，请根据自身真实行为和想法选择，无需刻意迎合他人，作答时请勿反复斟酌，凭第一直觉选择。</p>
                        <p>2. 选项分值：A=1分，B=2分，C=3分，D=4分，完成所有题目后计算总分，对照结果判定自己的情感人格类型。</p>
                        <p>3. 测试结果仅反映日常情感社交中的人格倾向，无绝对好坏，仅供自我认知参考，请勿过度较真。</p>
                    </div>
                </div>
            </div>
            <div id="result-container" style="display: none;">
                <div class="result-card">
                    <h2>测试结果</h2>
                    <div class="score-section">
                        <p class="result-score">你的得分：<span id="final-score">0</span>分</p>
                    </div>
                    <div class="type-section">
                        <p class="result-type">你的人格类型：<span id="personality-type">-</span></p>
                    </div>
                    <div class="description-section">
                        <h3>类型分析</h3>
                        <p id="result-description"></p>
                    </div>
                    <button id="restart-btn">重新测试</button>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 情感人格类型心理测试</p>
            <p class="footer-note">本测试仅供娱乐参考，非专业心理评估</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
