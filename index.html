<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情感人格类型心理测试</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>情感人格类型心理测试</h1>
            <p class="subtitle">探索你的情感特质，了解真实的自己</p>
        </div>
    </header>
    <main>
        <section id="test-container">
            <div id="cards-container">
                <div class="progress-wrapper">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                    </div>
                    <div class="progress-text" id="progress-text">1/60</div>
                </div>
                <div class="cards-wrapper">
                    <div id="question-card" class="card">
                        <div class="card-content">
                            <p id="question-text" class="question-text"></p>
                            <div id="options-container" class="options-container"></div>
                        </div>
                        <div class="card-footer">
                            <button id="prev-btn" class="prev-btn" disabled>上一题</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="result-container" style="display: none;">
                <div class="result-card">
                    <h2>测试结果</h2>
                    <div class="type-section">
                        <p class="result-type">你的人格类型：<span id="personality-type">-</span></p>
                    </div>
                    <div class="description-section">
                        <h3>类型分析</h3>
                        <p id="result-description"></p>
                    </div>
                    <button id="restart-btn">重新测试</button>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 情感人格类型心理测试</p>
            <p class="footer-note">本测试仅供娱乐参考，非专业心理评估</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
